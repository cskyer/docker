name: teea

services:
  jenkins:
    image: jenkins/jenkins:latest
    container_name: jenkins
    pull_policy: always
    init: true
    restart: unless-stopped
    ports:
      - "${JENKINS_HTTP_PORT}:8080"
      - "${JENKINS_AGENT_PORT}:50000"
    environment:
      TZ: "${TZ}"
      JAVA_OPTS: "${JENKINS_JAVA_OPTS}"
    volumes:
      - data:/var/jenkins_home
    healthcheck:
      test:
        - CMD-SHELL
        - "curl --fail --silent http://localhost:8080/login >/dev/null || exit 1"
      interval: "${JENKINS_HEALTHCHECK_INTERVAL}"
      timeout: "${JENKINS_HEALTHCHECK_TIMEOUT}"
      retries: ${JENKINS_HEALTHCHECK_RETRIES}
      start_period: "${JENKINS_HEALTHCHECK_START_PERIOD}"
    stop_grace_period: "${JENKINS_STOP_GRACE_PERIOD}"
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: ${JENKINS_NOFILE_SOFT_LIMIT}
        hard: ${JENKINS_NOFILE_HARD_LIMIT}
    logging:
      driver: json-file
      options:
        max-size: "${JENKINS_LOG_MAX_SIZE}"
        max-file: "${JENKINS_LOG_MAX_FILE}"

volumes:
  data:
    name: "${JENKINS_DATA_VOLUME_NAME}"
