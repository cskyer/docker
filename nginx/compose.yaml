services:
  nginx:
    image: nginx:latest
    container_name: nginx-gateway
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./html:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx
    networks:
      - network
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q '^ok$'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  network:
    driver: bridge
  proxy:
    name: ${NGINX_PROXY_NETWORK:-proxy}
    driver: bridge
