<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service temporarily unavailable</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: #1f2937;
      background: #f8fafc;
    }

    main {
      width: min(90vw, 520px);
      padding: 32px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.25;
    }

    p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <main>
    <h1>Service temporarily unavailable</h1>
    <p>The gateway reached nginx, but the upstream service is unavailable. Please try again later.</p>
  </main>
</body>
</html>
